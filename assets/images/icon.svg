<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Funnel/filter icon -->
  <path d="M60 72 L128 148 L128 196 L128 196 L128 148 L196 72 Z" fill="none" stroke="#312e81" stroke-width="0" />

  <!-- Filter bars (three horizontal lines, decreasing) -->
  <rect x="52" y="74" width="152" height="18" rx="9" fill="url(#accent)" opacity="1"/>
  <rect x="72" y="110" width="112" height="18" rx="9" fill="url(#accent)" opacity="0.85"/>
  <rect x="92" y="146" width="72" height="18" rx="9" fill="url(#accent)" opacity="0.7"/>

  <!-- WF letters at bottom -->
  <text x="128" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">WooFlux</text>
</svg>
